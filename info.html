<script>
  const NOTIFY_KEY = 'todo-app-notify';

  async function sendNotifyMessage(type) {
    if (!('serviceWorker' in navigator)) return;
    const reg = await navigator.serviceWorker.ready;
    if (reg.active) reg.active.postMessage({ type });
  }

  async function initToggle() {
    const saved = localStorage.getItem(NOTIFY_KEY) === 'true';
    document.getElementById('notifyToggle').checked = saved;
    if (saved) await sendNotifyMessage('NOTIFY_ON');
  }

  document.getElementById('notifyToggle').addEventListener('change', async function () {
    if (this.checked) {
      if (!('Notification' in window)) {
        alert('このブラウザはプッシュ通知に対応していません。');
        this.checked = false;
        return;
      }
      const perm = await Notification.requestPermission();
      if (perm !== 'granted') {
        this.checked = false;
        alert('通知の許可が必要です。ブラウザの設定から通知を許可してください。');
        return;
      }
      localStorage.setItem(NOTIFY_KEY, 'true');
      await sendNotifyMessage('NOTIFY_ON');
    } else {
      localStorage.setItem(NOTIFY_KEY, 'false');
      await sendNotifyMessage('NOTIFY_OFF');
    }
  });

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.ready.then(() => initToggle());
  }
</script>
